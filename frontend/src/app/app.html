<header class="topbar">
  <a class="wordmark" routerLink="/">
    <app-brand-mark [size]="30"></app-brand-mark>
    <span class="name">{{ i18n.t('app.title') }}</span>
  </a>

  <div class="spacer"></div>

  <nav class="segmented">
    @if (auth.isLoggedIn()) {
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">{{ i18n.t('nav.documents') }}</a>
    }
    <a routerLink="/verify" routerLinkActive="active">{{ i18n.t('nav.verify') }}</a>
  </nav>

  <div class="spacer"></div>

  <div class="top-actions">
    <button class="btn ghost sm" (click)="toggleLang()" aria-label="Toggle language">
      {{ i18n.lang() === 'en' ? 'العربية' : 'English' }}
    </button>
    @if (auth.isLoggedIn()) {
      <span class="who">{{ auth.user()?.displayName }}</span>
      <button class="btn subtle sm" (click)="logout()">{{ i18n.t('nav.logout') }}</button>
    } @else {
      <a class="btn primary sm" routerLink="/login">{{ i18n.t('nav.login') }}</a>
    }
  </div>
</header>

<main class="content">
  <router-outlet></router-outlet>
</main>

<footer class="foot">
  <span>SignVault · Angular · ASP.NET Core · Entity Framework Core</span>
  <span>{{ i18n.t('common.signedBy') }}</span>
</footer>
