name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore SignVault.slnx
      - run: dotnet build SignVault.slnx --no-restore -c Release
      - name: Run unit + integration tests
        run: dotnet test SignVault.slnx --no-build -c Release --verbosity normal
      - name: Check for vulnerable packages
        run: dotnet list SignVault.Api/SignVault.Api.csproj package --vulnerable --include-transitive || true

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Unit tests (Karma, headless Chrome --no-sandbox)
        run: npm run test:ci

  # Build the production image and publish it to GitHub Container Registry.
  # Anyone can then run:  docker run -p 8080:8080 ghcr.io/anas-lees/digital-signature-platform
  docker:
    name: Publish image (GHCR)
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/anas-lees/digital-signature-platform:latest
            ghcr.io/anas-lees/digital-signature-platform:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # CD: auto-deploy to the cloud on every push to main.
  # No-op until you add a RENDER_DEPLOY_HOOK secret (see deploy/DEPLOY.md).
  deploy:
    name: Deploy (cloud)
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK not set — skipping auto-deploy."
            echo "Add it (Settings → Secrets → Actions) to enable push-to-deploy."
            exit 0
          fi
          curl -fsSL "$HOOK" && echo "Render deploy triggered."
