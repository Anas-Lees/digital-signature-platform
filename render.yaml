# Render Blueprint — one-click deploy to a public URL, with a persistent database.
# https://render.com/deploy?repo=https://github.com/Anas-Lees/digital-signature-platform

databases:
  - name: signvault-db          # free Postgres so accounts & documents persist
    plan: free

services:
  - type: web
    name: signvault
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/verify/public-key
    envVars:
      - key: Jwt__Key            # strong JWT secret, generated once by Render
        generateValue: true
      - key: DATABASE_URL        # wired automatically from the Postgres above
        fromDatabase:
          name: signvault-db
          property: connectionString
      # Set these (Environment tab) so signatures stay valid across redeploys.
      # Generate them with:  deploy/New-SigningKey.ps1
      - key: Signing__PfxBase64
        sync: false
      - key: Signing__PfxPassword
        sync: false
