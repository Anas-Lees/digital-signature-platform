# Render Blueprint — one-click deploy to a public URL.
# https://render.com/deploy?repo=https://github.com/Anas-Lees/digital-signature-platform
services:
  - type: web
    name: signvault
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/verify/public-key
    envVars:
      - key: Jwt__Key          # strong JWT secret, generated by Render
        generateValue: true
